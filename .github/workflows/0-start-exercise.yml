name: Start Exercise

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write
  issues: write


env:
  STEP_FILE: ".github/steps/1-step.md"

jobs:
  start_exercise:
    if: |
      !github.event.repository.is_template
    name: Start Exercise
    uses: skills/exercise-toolkit/.github/workflows/start-exercise.yml@v0.7.3
    with:
      exercise-title: "GitHub Spec Kit desenvolvimento orientado por especificações."
      intro-message: "Aprenda a trabalhar com SDD com GitHub Copilot."

  post_next_step_content:
    name: Postar conteúdo do próximo passo
    runs-on: ubuntu-latest
    needs: [start_exercise]
    env:
      ISSUE_NUMBER: ${{ needs.start_exercise.outputs.issue-number }}
      ISSUE_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.7.0

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_FILE }}
          vars: |
            full_repo_name: ${{ github.repository }}

      - name: Habilitar workflow do próximo passo
        run: |
          gh workflow enable "Step 1"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Desabilitar workflow atual
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  translate_readme:
    name: Translate README to Portuguese
    runs-on: ubuntu-latest
    needs: [start_exercise]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Translate generated README
        run: |
          sed -i 's/Mona here\. I'\''m done preparing your exercise\. Hope you enjoy!/Mona aqui. Terminei de preparar seu exercício. Espero que goste!/g' README.md
          sed -i 's/Remember, it'\''s self-paced so feel free to take a break!/Lembre-se, o exercício é no seu ritmo, então sinta-se à vontade para fazer uma pausa!/g' README.md
          sed -i 's/Go%20to%20Exercise/Ir%20para%20o%20Exerc%C3%ADcio/g' README.md

      - name: Commit translated README
        uses: EndBug/add-and-commit@v9
        with:
          add: "README.md"
          message: "Traduzir README gerado para português"
          default_author: github_actions
